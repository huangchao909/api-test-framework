[pytest]
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    -s
    --strict-markers
    --alluredir=./reports/allure-results
    --clean-alluredir

markers =
    smoke: 冒烟测试
    regression: 回归测试
    p0: P0 级别用例
    p1: P1 级别用例
    p2: P2 级别用例
    get: GET 请求
    post: POST 请求
    put: PUT 请求
    delete: DELETE 请求
